<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orillusion | Basic Triangle</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #000;
        color: #fff;
        display: flex;
        text-align: center;
        flex-direction: column;
        justify-content: center;
      }
      p {
        font-size: 14px;
        margin: 0;
      }
      canvas {
        width: 100%;
        height: 100%;
      }

      .operate {
        width: 200px;
        position: fixed;
        top: 0;
        right: 0;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .operate input {
        width: 100%;
      }
    </style>
  </head>
  <body>
    <canvas></canvas>
    <div class="operate">
      <input type="color" id="colorSelect" />
      <input type="range" id="rangeSelect" min="-1" max="1" step="0.1" />
    </div>
    <script type="module" src="../src/colorTriangle.ts"></script>
  </body>
</html>
